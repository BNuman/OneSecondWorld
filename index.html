<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OneSecond World</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin-bottom: 5px;
    }
    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
      font-size: 16px;
      width: 100%;
      margin-top: 10px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      margin-top: 15px;
    }
    video, img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>OneSecond World</h1>
<p>1 sekund per dag</p>

<div class="card">
  <input type="file" id="fileInput" accept="video/*,image/*">
  <button onclick="saveMoment()">Spara dagens moment</button>
</div>

<div id="today" class="card"></div>

<div class="card">
  <button onclick="showRandom()">Se någon annans dag</button>
  <p id="randomText"></p>
</div>

<script>
const STORAGE_KEY = "one-second-world";

function getToday() {
  const d = new Date();
  return d.toISOString().split("T")[0];
}

function loadData() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function saveMoment() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Välj en fil");

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = loadData();
    data[getToday()] = {
      src: e.target.result,
      type: file.type
    };
    saveData(data);
    renderToday();
  };
  reader.readAsDataURL(file);
}

function renderToday() {
  const data = loadData();
  const today = data[getToday()];
  const el = document.getElementById("today");

  if (!today) {
    el.innerHTML = "Ingen video idag";
    return;
  }

  if (today.type.startsWith("video")) {
    el.innerHTML = "<video controls src='" + today.src + "'></video>";
  } else {
    el.innerHTML = "<img src='" + today.src + "' />";
  }
}

function showRandom() {
  const examples = [
    "Japan 🇯🇵 – morgontåg",
    "Brasilien 🇧🇷 – familjelunch",
    "Sverige 🇸🇪 – skogspromenad",
    "Kenya 🇰🇪 – fotboll",
    "Italien 🇮🇹 – kaffe"
  ];

  const random = examples[Math.floor(Math.random() * examples.length)];
  document.getElementById("randomText").innerText = random;
}

renderToday();
</script>

</body>
</html>
